<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeopardish! Arcade Cabinet</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
            background-color: #2c3e50;
        }
        .arcade-container {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .arcade-cabinet {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .cabinet-svg {
            width: 100%;
            height: 100%;
        }
        .screen-content {
            position: absolute;
            top: 10%;
            left: 10%;
            width: 80%;
            height: 62%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #000033;
            border-radius: 20px;
            overflow: hidden;
            font-family: 'Press Start 2P', cursive;
            color: #FFD700;
            text-align: center;
            padding: 2%;
            box-sizing: border-box;
        }
        .game-title {
            font-size: 4vh;
            margin-bottom: 2vh;
            text-shadow: 0.2vw 0.2vw #0000FF;
        }
        .subtitle {
            font-size: 2vh;
            margin-bottom: 4vh;
            color: #00FFFF;
            padding: 0 2vw;
            max-width: 80%;
        }
        .press-start {
            font-size: 3vh;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
        @font-face {
            font-family: 'Press Start 2P';
            src: url('https://fonts.gstatic.com/s/pressstart2p/v14/e3t4euO8T-267oIAQAu6jDQyK3nVivM.woff2') format('woff2');
            font-display: swap;
        }
    </style>
</head>
<body>
    <div class="arcade-container">
        <div class="arcade-cabinet">
            <svg class="cabinet-svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet">
                <!-- Cabinet body -->
                <path d="M0 0 L1000 0 L1000 900 L850 1000 L150 1000 L0 900 Z" fill="#8B4513" />
                <path d="M50 50 L950 50 L950 850 L800 950 L200 950 L50 850 Z" fill="#A0522D" />
                
                <!-- Screen area -->
                <path d="M75 75 L925 75 L925 750 L75 750 Z" fill="#D2691E" />
                <path d="M100 100 L900 100 L900 725 L100 725 Z" fill="#000033" />
                
                <!-- Screen glare -->
                <ellipse cx="500" cy="412" rx="400" ry="300" fill="url(#screenGlare)" />
                
                <!-- Control panel -->
                <path d="M0 750 L1000 750 L850 1000 L150 1000 Z" fill="#D2B48C" />
                
                <!-- Joystick -->
                <circle cx="250" cy="875" r="50" fill="url(#joystickGradient)" />
                <circle cx="250" cy="875" r="40" fill="url(#joystickTopGradient)" />
                
                <!-- Buttons - First row -->
                <circle cx="500" cy="825" r="30" fill="url(#buttonGradient1)" />
                <circle cx="600" cy="825" r="30" fill="url(#buttonGradient2)" />
                <circle cx="700" cy="825" r="30" fill="url(#buttonGradient3)" />
                
                <!-- Buttons - Second row -->
                <circle cx="550" cy="905" r="30" fill="url(#buttonGradient4)" />
                <circle cx="650" cy="905" r="30" fill="url(#buttonGradient5)" />
                <circle cx="750" cy="905" r="30" fill="url(#buttonGradient6)" />
                
                <!-- Gradients and filters -->
                <defs>
                    <radialGradient id="screenGlare" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
                        <stop offset="0%" style="stop-color:rgb(255,255,255);stop-opacity:0.3" />
                        <stop offset="100%" style="stop-color:rgb(255,255,255);stop-opacity:0" />
                    </radialGradient>
                    <linearGradient id="joystickGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#ff6b6b" />
                        <stop offset="100%" style="stop-color:#c23616" />
                    </linearGradient>
                    <radialGradient id="joystickTopGradient" cx="40%" cy="40%" r="60%" fx="40%" fy="40%">
                        <stop offset="0%" style="stop-color:#ff7f50" />
                        <stop offset="100%" style="stop-color:#ff4757" />
                    </radialGradient>
                    <radialGradient id="buttonGradient1" cx="30%" cy="30%" r="70%" fx="30%" fy="30%">
                        <stop offset="0%" style="stop-color:#74b9ff" />
                        <stop offset="100%" style="stop-color:#0984e3" />
                    </radialGradient>
                    <radialGradient id="buttonGradient2" cx="30%" cy="30%" r="70%" fx="30%" fy="30%">
                        <stop offset="0%" style="stop-color:#55efc4" />
                        <stop offset="100%" style="stop-color:#00b894" />
                    </radialGradient>
                    <radialGradient id="buttonGradient3" cx="30%" cy="30%" r="70%" fx="30%" fy="30%">
                        <stop offset="0%" style="stop-color:#ffeaa7" />
                        <stop offset="100%" style="stop-color:#fdcb6e" />
                    </radialGradient>
                    <radialGradient id="buttonGradient4" cx="30%" cy="30%" r="70%" fx="30%" fy="30%">
                        <stop offset="0%" style="stop-color:#ff7675" />
                        <stop offset="100%" style="stop-color:#d63031" />
                    </radialGradient>
                    <radialGradient id="buttonGradient5" cx="30%" cy="30%" r="70%" fx="30%" fy="30%">
                        <stop offset="0%" style="stop-color:#a29bfe" />
                        <stop offset="100%" style="stop-color:#6c5ce7" />
                    </radialGradient>
                    <radialGradient id="buttonGradient6" cx="30%" cy="30%" r="70%" fx="30%" fy="30%">
                        <stop offset="0%" style="stop-color:#fd79a8" />
                        <stop offset="100%" style="stop-color:#e84393" />
                    </radialGradient>
                </defs>
            </svg>
            <div class="screen-content">
                <div class="game-title">JEOPARDISH!</div>
                <div class="subtitle">The Trivia Game That's Almost, But Not Quite, Entirely Unlike Jeopardy</div>
                <div class="press-start">PRESS START</div>
            </div>
        </div>
    </div>
</body>
</html>
