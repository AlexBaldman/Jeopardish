name: basic-ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate question data
        run: node scripts/validate-questions.mjs
      - name: Syntax check app.js
        run: node --check app.js
