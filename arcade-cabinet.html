<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeopardish Arcade Cabinet</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components/arcade-cabinet.css">
    <link rel="stylesheet" href="css/media-queries.css">
</head>
<body>
    <div class="arcade-cabinet">
        <div class="arcade-screen">
            <div id="game-container">
                <!-- Game content will be dynamically inserted here -->
            </div>
        </div>
        <div class="arcade-controls">
            <div class="arcade-button" id="start-button">Start</div>
            <div class="arcade-button" id="reset-button">Reset</div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
