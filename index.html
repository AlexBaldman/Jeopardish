<!DOCTYPE html>
<html lang="en">
<head>
    <!-- viewport settings for better mobile responsiveness -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">    
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta charset="UTF-8">

    <!-- SEO related -->
    <meta name="description" content="Jeopardish! A unique comedic trivia adventure.">
    <meta property="og:title" content="Jeopardish!">
    <meta property="og:description" content="A unique comedic trivia adventure.">
    <meta property="og:image" content="screenshots/jeopardish-screenshot-noQuestion.png">
    
    <!-- title -->
    <title>Jeopardish!</title>
    
    <!-- favicons -->
    <link rel="icon" href="public/favicon.webp" tyixpe="image/webp">
    <!-- <link rel="icon" href="images/favicon2.webp" type="image/webp"> -->
    <!-- <link rel="icon" href="favicon.ico" type="image/x-icon"> -->

    <!-- font stylesheet -->
    <!-- <link rel="stylesheet" href="css/fonts.css"> -->
    
    <!-- main stylesheet -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- external JS -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

    <!-- app JS - load this first -->
    <script src="app.js"></script>

    <!-- translations - load this after app.js -->
    <script src="translations.js"></script>
    
    <!-- external CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css">
    
    <!-- fonts, icons, other CDN assets -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    
</hekoad>
<body lang="en">

    <!-- game container -->
    <div class="game-container">
        <!-- language toggle -->
        <div class="toggle-container left">
            <button id="lang-btn" data-lang="en" title="Switch Language">
                <span class="lang-text"></span>
            </button>
        </div>

        <!-- theme toggle -->
        <div class="toggle-container right">
            <button id="theme-btn" data-theme="light" title="Toggle Theme">
                <span class="theme-text"></span>
            </button>
        </div>

        <!-- header w. title image -->
        <div class="header">

            

             <!-- JEOPARODY! title image  -->
             <img id="titleImage" class="title-image" src="images/title/title-JeoPARODY.png" alt="JeoPARODY!">
             
            <!-- ALTERNATIVE TITLE IMAGES -->
                <!-- JEOPARDISH! title image (hosted on Cloudinary)-->
                <!-- <img class="title-image" src="https://res.cloudinary.com/alexbaldman/image/upload/c_scale,e_auto_saturation,h_72,q_65,w_373/v1592202698/Jeopardish/title_zldpdq.png" alt="Jeopardish!">   -->
                
                <!-- JEOPARDISH! title image (local) -->
                <!-- <img class="title-image" src="images/title/title-Jeopardish!.png" alt="JeoPARODY!"> -->

                <!-- JEOPARDISH! simple title  -->
                <!-- <img class="title-image" src="images/title/title-Jeopardish!-simple.png" alt="JeoPARODY!"> -->

                <!-- JEOPARDISH! black & white title  -->
                <!-- <img class="title-image" src="images/title/title-Jeopardish!-B&W.svg" alt="JeoPARODY!"> -->

        </div>

        

        <!-- button container div with "new question" & show answer buttons -->
        <div class="button-div">
            <button id="questionButton" aria-label="Get a new question">
                new question
            </button>
            <button id="answerButton" aria-label="Show or hide the answer">
                show answer
            </button>
        </div>

        <!-- user input -->
        <div class="input-div">
            <div class="input-wrapper">
                <input type="text" id="inputBox" placeholder="enter answer here...">
                <div class="custom-cursor"></div>
            </div>
        </div>
        <button id="checkButton" aria-label="check answer button">
            check answer
        </button>
        
        <!-- <button id="checkButton" class="styled-button">
            check answer
        </button> -->

        <!-- speech bubble with category, value, question & answer display areas -->
        <div class="speechBubble">
            <div id="categoryBox"></div>
            <div id="valueBox"></div>
            <div id="questionBox"></div>
            <div id="answerBox"></div>
        </div>
        
        <!-- host container / host image -->
        <div class="host-container">
            <img id="trebekImage" class="trebek host-image" alt="Alexander the Greatly Enlightened.." src="images/trebek/trebek-good-04.png" title="Click left/right side to cycle hosts">
        </div>

        <!-- scoreboard -->
        <div id="scoreboard">
            <div class="scoreboard-content">
                <div id="currentScore" class="scoreboard-text">
                    <span class="score-label">SCORE</span>
                    <span class="score-value">$0</span>
                </div>
                <div id="currentStreak" class="scoreboard-text">
                    <span class="score-label">STREAK</span>
                    <span class="score-value">0</span>
                </div>
                <div id="bestScore" class="scoreboard-text">
                    <span class="score-label">TOP SCORE</span>
                    <span class="score-value">$0</span>
                </div>
                <div id="bestStreak" class="scoreboard-text">
                    <span class="score-label">MAX STREAK</span>
                    <span class="score-value">0</span>
                </div>
            </div>
        </div>

        <!-- event ticker -->
        <div class="event-ticker">
            <div class="ticker-unit">
                <div class="ticker-plane">
                    <div class="propeller"></div>
                    <div class="propeller-hub"></div>
                    <div class="pontoon"></div>
                    <div class="pontoon"></div>
                </div>
                <div class="ticker-content"></div>
            </div>
        </div>
    </div>
    
</body>
</html>
