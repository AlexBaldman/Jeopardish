<!DOCTYPE html>
<html lang="en">
<head>
    <!-- viewport settings for better mobile responsiveness -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">    
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta charset="UTF-8">

    <!-- SEO related -->
    <meta name="description" content="Jeopardish! A unique comedic trivia adventure.">
    <meta property="og:title" content="Jeopardish!">
    <meta property="og:description" content="A unique comedic trivia adventure.">
    <meta property="og:image" content="screenshots/jeopardish-screenshot-noQuestion.png">
    
    <!-- title -->
    <title>Jeopardish!</title>
    
    <!-- favicons -->
    <link rel="icon" href="public/favicon.webp" tyixpe="image/webp">
    <!-- <link rel="icon" href="images/favicon2.webp" type="image/webp"> -->
    <!-- <link rel="icon" href="favicon.ico" type="image/x-icon"> -->

    <!-- font stylesheet -->
    <!-- <link rel="stylesheet" href="css/fonts.css"> -->
    
    <!-- main stylesheet -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- external JS -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

    <!-- Firebase scripts (must be first) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <!-- Your config (must be after Firebase scripts) -->
    <script src="firebase-config.js"></script>

    <!-- app JS - load this first -->
    <script src="app.js"></script>
    
    <!-- Make displayQuestion globally accessible -->
    <script>
        // Ensure displayQuestion is globally accessible for translations.js
        window.addEventListener('load', function() {
            if (typeof displayQuestion === 'function') {
                window.displayQuestion = displayQuestion;
                console.log('✅ displayQuestion function exposed to global scope for translations');
            } else {
                console.error('❌ displayQuestion function not found');
            }
        });
    </script>

    <!-- translations - load this after app.js -->
    <script src="translations.js"></script>
    
    <!-- external CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css">
    
    <!-- fonts, icons, other CDN assets -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    
</head>
<body lang="en">

    <!-- game container -->
    <div class="game-container">
        <!-- language toggle -->
        <div class="toggle-container left">
            <button id="lang-btn" data-lang="en" title="Switch Language">
                <span class="lang-text"></span>
            </button>
        </div>

        <!-- theme toggle -->
        <div class="toggle-container right">
            <button id="theme-btn" data-theme="light" title="Toggle Theme">
                <span class="theme-text"></span>
            </button>
        </div>

        <!-- header w. title image -->
        <div class="header">
            <!-- JEOPARODY! title image  -->
            <img id="titleImage" class="title-image" src="images/title/title-JeoPARODY.png" alt="JeoPARODY!">
            
            <!-- Auth buttons container - moved to be directly below the title -->
            <div class="auth-buttons-div">
                <div class="peek-handle">
                    <i class="fas fa-user-circle"></i>
                    <i class="fas fa-trophy"></i>
                </div>
                <button id="login-button" aria-label="Sign in to save scores">
                    <i class="fas fa-sign-in-alt"></i> sign in
                </button>
                <button id="leaderboard-button" aria-label="View leaderboard">
                    <i class="fas fa-crown"></i> leaderboard
                </button>
            </div>
             
            <!-- ALTERNATIVE TITLE IMAGES -->
                <!-- JEOPARDISH! title image (hosted on Cloudinary)-->
                <!-- <img class="title-image" src="https://res.cloudinary.com/alexbaldman/image/upload/c_scale,e_auto_saturation,h_72,q_65,w_373/v1592202698/Jeopardish/title_zldpdq.png" alt="Jeopardish!">   -->
                
                <!-- JEOPARDISH! title image (local) -->
                <!-- <img class="title-image" src="images/title/title-Jeopardish!.png" alt="JeoPARODY!"> -->

                <!-- JEOPARDISH! simple title  -->
                <!-- <img class="title-image" src="images/title/title-Jeopardish!-simple.png" alt="JeoPARODY!"> -->

                <!-- JEOPARDISH! black & white title  -->
                <!-- <img class="title-image" src="images/title/title-Jeopardish!-B&W.svg" alt="JeoPARODY!"> -->
        </div>

        <!-- button container div with "new question" & show answer buttons -->
        <div class="button-div">
            <button id="questionButton" aria-label="Get a new question">
                new question
            </button>
            <button id="answerButton" aria-label="Show or hide the answer">
                show answer
            </button>
        </div>
        
        <!-- user input -->
        <div class="input-div">
            <div class="input-wrapper">
                <input type="text" id="inputBox" placeholder="enter answer here...">
                <div class="custom-cursor"></div>
            </div>
        </div>
        <button id="checkButton" aria-label="check answer button">
            check answer
        </button>
        
        <!-- <button id="checkButton" class="styled-button">
            check answer
        </button> -->

        <!-- speech bubble with category, value, question & answer display areas -->
        <div class="speechBubble">
            <div id="categoryBox"></div>
            <div id="valueBox"></div>
            <div id="questionBox"></div>
            <div id="answerBox"></div>
        </div>
        
        <!-- host container / host image -->
        <div class="host-container">
            <img id="trebekImage" class="trebek host-image" alt="Alexander the Greatly Enlightened.." src="images/trebek/trebek-good-04.png" title="Click left/right side to cycle hosts">
        </div>

        <!-- scoreboard -->
        <div id="scoreboard">
            <div class="scoreboard-content">
                <div id="currentScore" class="scoreboard-text">
                    <span class="score-label">SCORE</span>
                    <span class="score-value">$0</span>
                </div>
                <div id="currentStreak" class="scoreboard-text">
                    <span class="score-label">STREAK</span>
                    <span class="score-value">0</span>
                </div>
                <div id="bestScore" class="scoreboard-text">
                    <span class="score-label">TOP SCORE</span>
                    <span class="score-value">$0</span>
                </div>
                <div id="bestStreak" class="scoreboard-text">
                    <span class="score-label">MAX STREAK</span>
                    <span class="score-value">0</span>
                </div>
            </div>
        </div>

        <!-- event ticker -->
        <div class="event-ticker">
            <div class="ticker-unit">
                <div class="ticker-plane">
                    <div class="wing"></div>
                    <div class="tail"></div>
                    <div class="stabilizer"></div>
                    <div class="propeller"></div>
                    <div class="propeller-hub"></div>
                    <div class="cockpit"></div>
                    <div class="pontoon"></div>
                    <div class="pontoon"></div>
                </div>
                <div class="ticker-content"></div>
            </div>
        </div>

        <!-- User profile section (hidden by default) -->
        <div id="user-profile" class="user-profile" style="display: none;">
            <img id="user-avatar" class="user-avatar">
            <span id="user-name"></span>
            <button id="profile-button">edit profile</button>
            <button id="logout-button">sign out</button>
        </div>

        <!-- Auth modal -->
        <div id="auth-modal" class="modal" style="display: none;">
            <div class="modal-content beautiful-modal">
                <button class="close-modal neon-x" aria-label="Close">&times;</button>
                <h2 style="color: #ffd700; text-align: center; margin-bottom: 1.5rem; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);">Sign In</h2>
                <div class="auth-buttons">
                    <button id="google-signin" class="provider-button">
                        <i class="fab fa-google"></i> Sign in with Google
                    </button>
                    <button id="email-signin" class="provider-button">
                        <i class="fas fa-envelope"></i> Sign in with Email
                    </button>
                    <button id="magic-link-signin" class="provider-button">
                        <i class="fas fa-magic"></i> Magic Link
                    </button>
                </div>
                <form id="email-form" style="display: none;">
                    <input type="email" id="email-input" placeholder="Email" required>
                    <input type="password" id="password-input" placeholder="Password" required>
                    <button type="submit" id="email-submit">Sign In</button>
                    <p style="text-align: center; margin-top: 1rem; color: rgba(255, 255, 255, 0.8);">
                        Don't have an account? <a href="#" id="toggle-signup">Sign Up</a>
                    </p>
                </form>
                <form id="magic-link-form" style="display: none;">
                    <input type="email" id="magic-link-email" placeholder="Email" required>
                    <button type="submit" id="magic-link-submit">Send Magic Link</button>
                </form>
                <div id="auth-error" class="auth-error"></div>
            </div>
        </div>

        <!-- Leaderboard modal -->
        <div id="leaderboard-modal" class="modal" style="display: none;">
            <div class="modal-content beautiful-modal">
                <button class="close-modal neon-x" aria-label="Close">&times;</button>
                <h2 style="color: #ffd700; text-align: center; margin-bottom: 1.5rem; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);">Top Scores</h2>
                <div class="leaderboard-tabs">
                    <button class="tab-button active" data-tab="top-scores">Top Scores</button>
                    <button class="tab-button" data-tab="top-streaks">Top Streaks</button>
                </div>
                <div class="tab-content active" id="top-scores">
                    <table class="leaderboard-table">
                        <thead>
                            <tr>
                                <th>Rank</th>
                                <th>Player</th>
                                <th>Score</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody id="scores-body">
                            <!-- Will be populated with JavaScript -->
                        </tbody>
                    </table>
                </div>
                <div class="tab-content" id="top-streaks">
                    <table class="leaderboard-table">
                        <thead>
                            <tr>
                                <th>Rank</th>
                                <th>Player</th>
                                <th>Streak</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody id="streaks-body">
                            <!-- Will be populated with JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- User Profile Modal -->
        <div id="profile-modal" class="modal" style="display: none;">
            <div class="modal-content beautiful-modal">
                <button class="close-modal neon-x" aria-label="Close">&times;</button>
                <h2 style="color: #ffd700; text-align: center; margin-bottom: 1.5rem; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);">Your Profile</h2>
                <form id="profile-form">
                    <div class="profile-field">
                        <label for="display-name">Display Name (for Leaderboard)</label>
                        <input type="text" id="display-name" placeholder="Enter your display name" required maxlength="20">
                        <p class="field-hint">This is how you'll appear on the leaderboard</p>
                    </div>
                    <div class="profile-avatar">
                        <img id="profile-avatar-preview" class="avatar-preview">
                        <div class="avatar-options">
                            <button type="button" id="generate-avatar" class="avatar-button">Generate Random Avatar</button>
                        </div>
                    </div>
                    <div class="profile-actions">
                        <button type="submit" id="save-profile" class="primary-button">Save Profile</button>
                    </div>
                    <div id="profile-error" class="auth-error"></div>
                </form>
            </div>
        </div>
    </div>
    
</body>
</html>
