<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
    <defs>
        <filter id="grunge" x="-50%" y="-50%" width="200%" height="200%">
            <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3" result="noise" />
            <feDiffuseLighting in="noise" lighting-color="#ffffff" surfaceScale="1">
                <feDistantLight azimuth="45" elevation="55" />
            </feDiffuseLighting>
        </filter>
    </defs>
    <text x="50%" y="50%" font-family="'Impact', sans-serif" font-size="120" fill="url(#gradient)" text-anchor="middle" dominant-baseline="middle" filter="url(#grunge)">
        Jeopardish!
    </text>
</svg>

@keyframes bounce {
    0%, 20%, 50%, 80%, 100% {
        transform: translateY(0);
    }
    40% {
        transform: translateY(-20px);
    }
    60% {
        transform: translateY(-10px);
    }
}

#jeopardish {
    animation: bounce 2s infinite;
    transition: fill 0.5s;
}

#jeopardish:hover {
    fill: #ffcc00; 
    /* Change color on hover */
}